<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="案件管理">
<meta name="theme-color" content="#1e293b">
<title>案件管理 - スケジュール確認表</title>
<style>
  :root{
    --bg:#f4f6f9; --panel:#fff; --line:#d8dee6; --ink:#1f2933;
    --sub:#5b6b7b; --accent:#2563eb; --accent-d:#1d4ed8; --soft:#eef3fb;
    --warn:#dc2626; --ok:#059669; --pcolbg:#f8fafc; --thbg:#f1f5f9;
  }
  body.dark{
    --bg:#0f172a; --panel:#1e293b; --line:#334155; --ink:#e2e8f0;
    --sub:#94a3b8; --soft:#1e3a5f; --pcolbg:#243349; --thbg:#243349;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Hiragino Kaku Gothic ProN","Meiryo",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;transition:background .2s,color .2s;}
  header{background:#1e293b;color:#fff;padding:14px 22px;display:flex;align-items:center;gap:18px;}
  header h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.5px;}
  header .date{margin-left:auto;font-size:13px;color:#cbd5e1;}
  nav{display:flex;gap:6px;background:var(--panel);padding:8px 22px;border-bottom:1px solid var(--line);}
  nav button{border:none;background:transparent;padding:9px 18px;border-radius:8px;
    cursor:pointer;font-size:14px;font-weight:600;color:var(--sub);}
  nav button.active{background:var(--accent);color:#fff;}
  .wrap{padding:22px;max-width:1700px;margin:0 auto;}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px;
    box-shadow:0 1px 3px rgba(0,0,0,.04);margin-bottom:20px;}
  .panel h2{margin:0 0 14px;font-size:16px;}
  /* form */
  .form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .field label{display:block;font-size:12px;color:var(--sub);margin-bottom:5px;font-weight:600;}
  .field input,.field select{width:100%;padding:9px 11px;border:1px solid var(--line);
    border-radius:8px;font-size:14px;background:var(--panel);color:var(--ink);}
  .field input:focus,.field select:focus{outline:none;border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(37,99,235,.12);}
  .actions{margin-top:16px;display:flex;gap:10px;}
  .btn{padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:var(--accent-d);}
  .btn-ghost{background:var(--soft);color:var(--sub);}
  .btn-ghost.active{background:var(--accent);color:#fff;}
  .btn-sm{padding:5px 12px;font-size:12px;border-radius:6px;}
  .btn-del{background:#fee2e2;color:var(--warn);}
  body.dark .btn-del{background:#4c1d1d;color:#fca5a5;}
  .btn-edit{background:var(--soft);color:var(--accent);}
  /* list table */
  table{border-collapse:collapse;width:100%;}
  .list-tbl th,.list-tbl td{border:1px solid var(--line);padding:8px 10px;text-align:center;font-size:13px;}
  .list-tbl th{background:var(--thbg);color:var(--sub);font-weight:700;}
  .list-tbl tr:nth-child(even){background:rgba(127,127,127,.05);}
  .muted{color:#94a3b8;}
  /* ===== タスク管理表 ===== */
  .sched-scroll{overflow:auto;border:1px solid var(--line);border-radius:10px;
    -webkit-overflow-scrolling:touch;}
  .sched{border-collapse:collapse;}
  .sched th,.sched td{border:1px solid var(--line);padding:0;vertical-align:top;}
  .sched thead th{background:#1e293b;color:#fff;position:sticky;top:0;z-index:2;
    text-align:center;font-weight:700;padding:8px 4px;font-size:12px;}
  .sched th.mhead{width:56px;min-width:56px;}
  .sched .pcol{position:sticky;left:0;background:var(--pcolbg);z-index:1;text-align:left;
    min-width:112px;max-width:132px;font-weight:600;padding:6px 8px;}
  .sched thead .pcol{background:#0f172a;z-index:3;}
  .sched td.mcell{padding:2px;height:1px;}
  /* チェックする小さいマス（段階式） */
  .chk{display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;border-radius:5px;padding:3px 2px;margin:2px 0;font-size:10px;
    font-weight:700;line-height:1.15;cursor:pointer;user-select:none;
    min-height:30px;transition:all .12s;}
  .chk .nm{display:block;}
  .chk .mk{display:block;font-size:10px;margin-top:1px;opacity:.5;}
  .chk.prog .mk{opacity:1;}
  .chk.done{color:#fff !important;}
  .chk.done .nm{text-decoration:line-through;opacity:.95;}
  .chk.done .mk{opacity:1;}
  .chk.nocheck{cursor:default;opacity:.85;border-style:dashed !important;}
  .reorder{display:flex;gap:3px;margin-top:4px;}
  .mini{border:1px solid var(--line);background:var(--panel);color:var(--sub);
    border-radius:5px;font-size:11px;line-height:1;padding:2px 5px;cursor:pointer;font-weight:700;}
  .mini.del{color:var(--warn);}
  .pname{font-weight:700;font-size:13px;}
  .pmeta{font-size:10px;color:var(--sub);font-weight:400;margin-top:2px;line-height:1.4;}
  .empty{padding:40px;text-align:center;color:#94a3b8;}
  .legend{display:flex;flex-wrap:wrap;gap:8px 12px;margin-bottom:14px;}
  .legend span{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--sub);}
  .legend i{width:14px;height:14px;border-radius:4px;display:inline-block;}
  .sched-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px;}
  .sched-bar .spacer{flex:1;}
  .year-nav{display:flex;align-items:center;gap:8px;}
  .year-label{font-size:18px;font-weight:700;min-width:72px;text-align:center;color:var(--accent);}
  /* やることリスト（カード・グリッド） */
  /* やること追加バー */
  .todo-addbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px;
    padding:12px;background:var(--thbg);border:1px solid var(--line);border-radius:10px;}
  .todo-addbar select,.todo-addbar input{padding:8px 10px;border:1px solid var(--line);
    border-radius:7px;font-size:13px;background:var(--panel);color:var(--ink);}
  .todo-addbar .ti{flex:1;min-width:160px;}
  /* 優先度グループ */
  .pri-group{margin-bottom:18px;}
  .pri-head{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;
    margin:0 0 8px;padding-bottom:6px;border-bottom:2px solid var(--line);}
  .pri-badge{display:inline-block;font-size:11px;font-weight:700;color:#fff;
    border-radius:5px;padding:2px 9px;}
  .pri-high .pri-badge,.pb-high{background:#dc2626;}
  .pri-mid  .pri-badge,.pb-mid {background:#d97706;}
  .pri-low  .pri-badge,.pb-low {background:#0891b2;}
  .todo-list{list-style:none;margin:0;padding:0;}
  .todo-item{display:flex;align-items:center;gap:9px;padding:9px 10px;font-size:13px;
    border:1px solid var(--line);border-radius:8px;margin-bottom:6px;background:var(--panel);}
  .todo-item.done{opacity:.6;}
  .todo-item.done .todo-txt{text-decoration:line-through;color:#94a3b8;}
  .todo-chk{cursor:pointer;font-weight:700;color:var(--accent);width:18px;text-align:center;font-size:15px;}
  .todo-prop{font-size:11px;color:var(--sub);background:var(--soft);border-radius:5px;
    padding:2px 7px;white-space:nowrap;}
  .todo-txt{flex:1;cursor:pointer;word-break:break-word;}
  .pb{display:inline-block;font-size:10px;font-weight:700;color:#fff;border-radius:4px;padding:1px 6px;}
  .todo-empty{color:#94a3b8;font-size:13px;padding:8px 2px;}
  .rule-tbl td,.rule-tbl th{border:1px solid var(--line);padding:6px 10px;font-size:12px;}
  .rule-tbl th{background:var(--thbg);}
  .hint{font-size:12px;color:var(--sub);margin:-6px 0 14px;}
  /* ===== レスポンシブ（スマホ） ===== */
  @media (max-width:640px){
    header{padding:11px 14px;gap:10px;}
    header h1{font-size:15px;}
    header .date{font-size:11px;}
    nav{padding:6px 10px;gap:4px;overflow-x:auto;}
    nav button{padding:8px 12px;font-size:13px;white-space:nowrap;}
    .wrap{padding:12px;}
    .panel{padding:14px;border-radius:10px;margin-bottom:14px;}
    .form-grid{grid-template-columns:1fr;gap:11px;}
    .field input,.field select{font-size:16px;padding:11px;} /* iOSズーム防止 */
    .btn{padding:11px 18px;}
    .list-tbl th,.list-tbl td{padding:6px 4px;font-size:12px;}
    .sched th.mhead{width:48px;min-width:48px;}
    .sched .pcol{min-width:90px;max-width:100px;padding:5px 6px;}
    .pname{font-size:12px;}
    .chk{min-height:34px;font-size:9px;} /* タップしやすく */
    .todo-addbar select,.todo-addbar input{font-size:16px;}
    .todo-addbar .ti{min-width:0;flex-basis:100%;}
  }
</style>
</head>
<body>
<header>
  <h1>案件管理 — スケジュール確認表</h1>
  <span class="date" id="today"></span>
</header>
<nav>
  <button id="tab-input" class="active" onclick="show('input')">入力情報</button>
  <button id="tab-sched" onclick="show('sched')">タスク管理表</button>
  <button id="tab-todo" onclick="show('todo')">やることリスト</button>
  <button id="tab-rule" onclick="show('rule')">タスク基準</button>
</nav>

<div class="wrap">
  <!-- ============ 入力ページ ============ -->
  <section id="page-input">
    <div class="panel">
      <h2 id="form-title">マンション情報を登録</h2>
      <p class="hint">※タスクは各月（1〜12月）に自動で割り当てられます。年をまたぐ計算にも対応しています。</p>
      <div class="form-grid">
        <div class="field">
          <label>① マンションコード</label>
          <input id="f-code" type="text" placeholder="例：2321">
        </div>
        <div class="field">
          <label>② マンション名</label>
          <input id="f-name" type="text" placeholder="例：天王寺">
        </div>
        <div class="field">
          <label>③ 戸数</label>
          <input id="f-units" type="number" min="0" placeholder="例：427">
        </div>
        <div class="field">
          <label>④ 決算月</label>
          <select id="f-settle"></select>
        </div>
        <div class="field">
          <label>⑤ 総会開催月</label>
          <select id="f-meeting"></select>
        </div>
        <div class="field">
          <label>⑥ 契約満了月 <span class="muted">(申出書計算に使用)</span></label>
          <select id="f-expire"></select>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="saveProp()">登録する</button>
        <button class="btn btn-ghost" onclick="resetForm()">クリア</button>
      </div>
    </div>

    <div class="panel">
      <h2>登録済みマンション一覧</h2>
      <table class="list-tbl">
        <thead>
          <tr><th>No</th><th>コード</th><th>マンション名</th><th>戸数</th>
          <th>決算月</th><th>総会月</th><th>契約満了月</th><th>操作</th></tr>
        </thead>
        <tbody id="list-body"></tbody>
      </table>
    </div>
  </section>

  <!-- ============ スケジュールページ ============ -->
  <section id="page-sched" style="display:none">
    <div class="panel">
      <h2>スケジュール確認表（12ヶ月）</h2>
      <p class="hint">各マスをタップするたびに進捗が段階的に進みます（例：総会→総会報告→総会完了→未着手に戻る）。進捗は西暦年ごとに記録されます。</p>
      <div class="sched-bar">
        <div class="year-nav">
          <button class="btn btn-sm btn-ghost" onclick="changeYear(-1)">◀ 前年</button>
          <span id="year-label" class="year-label"></span>
          <button class="btn btn-sm btn-ghost" onclick="changeYear(1)">翌年 ▶</button>
        </div>
        <span class="spacer" style="flex:0 0 12px"></span>
        <button class="btn btn-sm btn-ghost" id="btn-edit" onclick="toggleEdit()">並び替え</button>
        <button class="btn btn-sm btn-ghost" id="btn-dark" onclick="toggleDark()">🌙 ダーク</button>
        <span class="spacer"></span>
        <button class="btn btn-sm btn-del" onclick="resetChecks()">チェック全解除</button>
      </div>
      <div class="legend" id="legend"></div>
      <div class="sched-scroll">
        <table class="sched">
          <thead><tr id="sched-head"></tr></thead>
          <tbody id="sched-body"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- ============ やることリストページ ============ -->
  <section id="page-todo" style="display:none">
    <div class="panel">
      <h2>やることリスト（優先度順）</h2>
      <p class="hint">優先度ごとにまとめて表示されます（高→中→低）。完了したらタップでチェック。</p>
      <div class="todo-addbar">
        <select id="todo-prop"></select>
        <select id="todo-pri">
          <option value="high">優先度：高</option>
          <option value="mid" selected>優先度：中</option>
          <option value="low">優先度：低</option>
        </select>
        <input class="ti" id="todo-in" placeholder="やること内容を入力…" onkeydown="if(event.key==='Enter')addTodo()">
        <button class="btn btn-sm btn-primary" onclick="addTodo()">追加</button>
        <span class="spacer" style="flex:1"></span>
        <button class="btn btn-sm btn-ghost" id="btn-dark2" onclick="toggleDark()">🌙 ダーク</button>
      </div>
      <div id="todo-side"></div>
    </div>
  </section>

  <!-- ============ 基準ページ ============ -->
  <section id="page-rule" style="display:none">
    <div class="panel">
      <h2>タスク反映基準</h2>
      <table class="rule-tbl">
        <thead><tr><th>No</th><th>タスク（進捗段階）</th><th>基準</th></tr></thead>
        <tbody id="rule-body"></tbody>
      </table>
    </div>
  </section>
</div>

<script>
/* ===== タスク定義 =====
   base: 'settle'=決算月, 'meeting'=総会月, 'expire'=契約満了月
   off : 月のずらし（+翌月 / -前月）
   stages: タップで進む進捗段階（最後＝完了）。noCheck=true は表記のみ */
const TASKS = [
  {key:'soukai',   base:'meeting', off:0,  rule:'情報入力から反映',  color:'#2563eb',
    stages:['総会','総会報告中','総会完了']},
  {key:'rijikai',  base:'meeting', off:-1, rule:'総会の前月',        color:'#7c3aed',
    stages:['決算理事会','決算理事会完了']},
  {key:'kessan',   base:'settle',  off:0,  rule:'情報入力から反映',  color:'#0f766e',
    noCheck:true, label:'決算'},
  {key:'manryo',   base:'expire',  off:0,  rule:'情報入力から反映',  color:'#b91c1c',
    stages:['契約満期','契約完了申請中','契約完了']},
  {key:'jimuhoko', base:'settle',  off:1,  rule:'決算の翌月',        color:'#0891b2',
    stages:['管理事務報告','管理事務報告書申請中','管理事務報告完了']},
  {key:'itaku',    base:'meeting', off:-2, rule:'総会の2ヶ月前',     color:'#9333ea',
    stages:['委託契約書','契約書変更申請中','契約書正式申請中','契約書捺印伺中','委託契約書完了']},
  {key:'yotei',    base:'settle',  off:-1, rule:'決算の前月',        color:'#0d9488',
    stages:['年間業務予定表','年間業務予定表申請中','年間業務予定表完了']},
  {key:'tekisei',  base:'settle',  off:-3, rule:'決算の3ヶ月前',     color:'#ca8a04',
    stages:['適正化法予定','適正化法予定完了']},
  {key:'moushide', base:'expire',  off:-3, rule:'契約満了の3ヶ月前', color:'#ea580c',
    stages:['申出書','申出書申請中','申出書完了']},
  {key:'parking',  base:'settle',  off:-2, rule:'決算の2ヶ月前',     color:'#65a30d',
    stages:['駐車場チェック','駐車場チェック完了']},
  {key:'kaigi',    base:'settle',  off:-3, rule:'決算の3ヶ月前',     color:'#db2777',
    stages:['マンション会議','マンション会議完了']},
  {key:'gijiroku', base:'meeting', off:1,  rule:'総会の翌月',        color:'#4f46e5',
    stages:['総会議事録','総会議事録作成','総会議事録捺印依頼中','総会議事録完了']},
  {key:'shushi',   base:'settle',  off:1,  rule:'決算の翌月',        color:'#be123c',
    stages:['収支仮締め','仮締め申請中','収支仮締め完了']},
];
function taskName(t){ return t.label || (t.stages ? t.stages[0] : ''); }

const STORE='kanken_props_v1', CHECKS='kanken_checks_v1',
      TODOS='kanken_todos_v1', DARK='kanken_dark_v1';
const YEARSEL='kanken_year_v1';
let props  = JSON.parse(localStorage.getItem(STORE)  || '[]');
let checks = JSON.parse(localStorage.getItem(CHECKS) || '{}'); // { year:{ id:{ key:stageIndex } } }
let todos  = JSON.parse(localStorage.getItem(TODOS)  || '{}'); // { id:[ {t,done,pri} ] }
let editIdx=-1, editMode=false;
let curYear = +localStorage.getItem(YEARSEL) || new Date().getFullYear();

/* 旧データ移行 */
(function migrate(){
  // (a) boolean → 段階index
  for(const a in checks) for(const b in checks[a]){
    const lvl=checks[a][b];
    if(lvl===true){ const t=TASKS.find(x=>x.key===b);
      checks[a][b]= t&&t.stages ? t.stages.length-1 : 1; }
  }
  // (b) 年スコープ化：旧フラット形式 { id:{key:idx} } を当年配下へ移動
  const top=Object.keys(checks);
  const isFlat=top.some(k=>k.startsWith('c:')||k.startsWith('n:'));
  if(isFlat){
    const moved={}; const y=String(new Date().getFullYear());
    moved[y]=checks; checks=moved;
  }
  localStorage.setItem(CHECKS, JSON.stringify(checks));
  // (c) 優先度未設定のやることは「中」に
  let tch=false;
  for(const id in todos) for(const it of todos[id]){ if(!it.pri){ it.pri='mid'; tch=true; } }
  if(tch) localStorage.setItem(TODOS, JSON.stringify(todos));
})();

const PRI={high:{label:'高',order:0},mid:{label:'中',order:1},low:{label:'低',order:2}};

/* 選択中の年のチェック集合を取得（無ければ作る） */
function yearChecks(){
  const y=String(curYear);
  checks[y]=checks[y]||{};
  return checks[y];
}

/* 物件の識別子（コード優先・無ければ名前） */
function pid(p){ return (p.code && String(p.code).trim()) ? 'c:'+p.code : 'n:'+p.name; }
function persist(){ localStorage.setItem(STORE, JSON.stringify(props)); }
function persistChecks(){ localStorage.setItem(CHECKS, JSON.stringify(checks)); }
function persistTodos(){ localStorage.setItem(TODOS, JSON.stringify(todos)); }

/* ===== 段階チェック（選択中の年スコープ） ===== */
function cycleStage(id, key){
  const t=TASKS.find(x=>x.key===key); if(!t||t.noCheck) return;
  const yc=yearChecks();
  let idx=(yc[id]&&yc[id][key])||0;
  idx=(idx+1)%t.stages.length;
  yc[id]=yc[id]||{};
  if(idx===0) delete yc[id][key]; else yc[id][key]=idx;
  if(!Object.keys(yc[id]).length) delete yc[id];
  persistChecks(); renderSched();
}
function changeYear(delta){
  curYear+=delta; localStorage.setItem(YEARSEL,curYear);
  document.getElementById('year-label').textContent=curYear+'年';
  renderSched();
}
function resetChecks(){
  if(!confirm(curYear+'年の進捗チェックをすべて解除します。よろしいですか？')) return;
  delete checks[String(curYear)]; persistChecks(); renderSched();
}

/* ===== 月計算 ===== */
function shift(m,off){ return ((m-1+off)%12+12)%12+1; }
function baseMonth(p,base){ return base==='settle'?+p.settle:base==='meeting'?+p.meeting:+p.expire; }

/* ===== 月セレクト ===== */
function fillMonthSelects(){
  const opts='<option value="">—</option>'+
    Array.from({length:12},(_,i)=>`<option value="${i+1}">${i+1}月</option>`).join('');
  ['f-settle','f-meeting','f-expire'].forEach(id=>document.getElementById(id).innerHTML=opts);
}

/* ===== 物件 保存/編集/削除 ===== */
function val(id){ return document.getElementById(id).value.trim(); }
function setv(id,v){ document.getElementById(id).value=v||''; }
function saveProp(){
  const rec={code:val('f-code'),name:val('f-name'),units:val('f-units'),
    settle:val('f-settle'),meeting:val('f-meeting'),expire:val('f-expire')};
  if(!rec.name){ alert('マンション名を入力してください'); return; }
  if(!rec.settle||!rec.meeting){ alert('決算月と総会開催月を選択してください'); return; }
  if(editIdx>=0){ props[editIdx]=rec; editIdx=-1; } else { props.push(rec); }
  persist(); resetForm(); renderList(); renderSched(); renderTodos();
}
function resetForm(){
  ['f-code','f-name','f-units','f-settle','f-meeting','f-expire'].forEach(id=>setv(id,''));
  editIdx=-1; document.getElementById('form-title').textContent='マンション情報を登録';
}
function editProp(i){
  const p=props[i];
  setv('f-code',p.code); setv('f-name',p.name); setv('f-units',p.units);
  setv('f-settle',p.settle); setv('f-meeting',p.meeting); setv('f-expire',p.expire);
  editIdx=i; document.getElementById('form-title').textContent='マンション情報を編集';
  show('input'); window.scrollTo({top:0,behavior:'smooth'});
}
function delProp(i){
  if(!confirm(`「${props[i].name}」を削除しますか？`)) return;
  props.splice(i,1); persist(); renderList(); renderSched(); renderTodos();
}
function moveProp(i,dir){
  const j=i+dir; if(j<0||j>=props.length) return;
  [props[i],props[j]]=[props[j],props[i]];
  persist(); renderSched(); renderList();
}

/* ===== 一覧描画 ===== */
function renderList(){
  const b=document.getElementById('list-body');
  if(!props.length){ b.innerHTML='<tr><td colspan="8" class="muted" style="padding:24px">未登録です</td></tr>'; return; }
  b.innerHTML=props.map((p,i)=>`
    <tr>
      <td>${i+1}</td><td>${esc(p.code)}</td><td style="text-align:left">${esc(p.name)}</td>
      <td>${esc(p.units)}</td><td>${p.settle?p.settle+'月':'—'}</td>
      <td>${p.meeting?p.meeting+'月':'—'}</td><td>${p.expire?p.expire+'月':'—'}</td>
      <td>
        <button class="btn btn-sm btn-edit" onclick="editProp(${i})">編集</button>
        <button class="btn btn-sm btn-del" onclick="delProp(${i})">削除</button>
      </td>
    </tr>`).join('');
}

/* ===== スケジュール描画 ===== */
function renderSched(){
  const head=document.getElementById('sched-head');
  head.innerHTML='<th class="pcol">マンション</th>'+
    Array.from({length:12},(_,i)=>`<th class="mhead">${i+1}月</th>`).join('');
  const body=document.getElementById('sched-body');
  if(!props.length){ body.innerHTML='<tr><td colspan="13" class="empty">マンションを登録するとここに表示されます</td></tr>'; return; }

  const yc=yearChecks();
  body.innerHTML=props.map((p,pi)=>{
    const id=pid(p), cdone=yc[id]||{};
    const cells=Array.from({length:12},()=>[]);
    TASKS.forEach(t=>{
      const bm=baseMonth(p,t.base); if(!bm) return;
      cells[shift(bm,t.off)-1].push(t);
    });
    const tds=cells.map(list=>`<td class="mcell">${list.map(t=>{
      if(t.noCheck){
        return `<div class="chk nocheck" style="background:${hex2bg(t.color)};color:${t.color};border:1px dashed ${hex2bd(t.color)}"><span class="nm">${t.label}</span></div>`;
      }
      const idx=cdone[t.key]||0, last=t.stages.length-1, label=t.stages[Math.min(idx,last)];
      let cls,style,mark;
      if(idx===0){ cls=''; style=`background:${hex2bg(t.color)};color:${t.color};border:1px solid ${hex2bd(t.color)}`; mark='□'; }
      else if(idx>=last){ cls='done'; style=`background:${t.color};border:1px solid ${t.color}`; mark='✓'; }
      else { cls='prog'; style=`background:${hex2mid(t.color)};color:${t.color};border:1px solid ${t.color}`; mark='●'+idx; }
      return `<div class="chk ${cls}" style="${style}" onclick="cycleStage('${jsq(id)}','${t.key}')">`+
        `<span class="nm">${label}</span><span class="mk">${mark}</span></div>`;
    }).join('')}</td>`).join('');
    const meta=[p.code?'#'+p.code:'',p.units?p.units+'戸':'',
      '決算'+p.settle+'月','総会'+p.meeting+'月',p.expire?'満了'+p.expire+'月':'']
      .filter(Boolean).join(' / ');
    const reorder=editMode?`<div class="reorder">
      <button class="mini" onclick="moveProp(${pi},-1)">▲</button>
      <button class="mini" onclick="moveProp(${pi},1)">▼</button></div>`:'';
    return `<tr><td class="pcol"><div class="pname">${esc(p.name)}</div>
      <div class="pmeta">${meta}</div>${reorder}</td>${tds}</tr>`;
  }).join('');
}
function hex2bg(h){ return h+'18'; }
function hex2mid(h){ return h+'33'; }
function hex2bd(h){ return h+'55'; }

/* ===== やることリスト（優先度順・全物件統合） ===== */
function propName(id){ const p=props.find(x=>pid(x)===id); return p?p.name:'(削除済)'; }
function fillTodoProps(){
  const sel=document.getElementById('todo-prop');
  if(!sel) return;
  const cur=sel.value;
  sel.innerHTML=props.length
    ? props.map(p=>`<option value="${esc(pid(p))}">${esc(p.name)}</option>`).join('')
    : '<option value="">物件を登録してください</option>';
  if(cur) sel.value=cur;
}
function renderTodos(){
  fillTodoProps();
  const el=document.getElementById('todo-side');
  if(!props.length){ el.innerHTML='<div class="empty">マンションを登録するとここに表示されます</div>'; return; }
  // 全物件のやることを1配列に集約（優先度→未完了優先で並べる）
  const all=[];
  for(const id in todos){ (todos[id]||[]).forEach((it,j)=>all.push({id,j,it})); }
  let html='';
  ['high','mid','low'].forEach(pk=>{
    const group=all.filter(x=>x.it.pri===pk)
      .sort((a,b)=> (a.it.done-b.it.done)); // 未完了を上に
    const rows=group.length ? group.map(({id,j,it})=>`
      <li class="todo-item ${it.done?'done':''}">
        <span class="todo-chk" onclick="toggleTodo('${jsq(id)}',${j})">${it.done?'✓':'○'}</span>
        <span class="todo-prop">${esc(propName(id))}</span>
        <span class="todo-txt" onclick="toggleTodo('${jsq(id)}',${j})">${esc(it.t)}</span>
        <button class="mini del" onclick="delTodo('${jsq(id)}',${j})">×</button>
      </li>`).join('') : `<li class="todo-empty">なし</li>`;
    html+=`<div class="pri-group pri-${pk}">
      <h3 class="pri-head"><span class="pri-badge">優先度 ${PRI[pk].label}</span></h3>
      <ul class="todo-list">${rows}</ul></div>`;
  });
  el.innerHTML=html;
}
function addTodo(){
  const id=document.getElementById('todo-prop').value;
  const pri=document.getElementById('todo-pri').value;
  const inp=document.getElementById('todo-in'), v=inp.value.trim();
  if(!id){ alert('物件を選択してください'); return; }
  if(!v) return;
  todos[id]=todos[id]||[]; todos[id].push({t:v,done:false,pri});
  persistTodos(); inp.value=''; renderTodos(); inp.focus();
}
function toggleTodo(id,j){
  if(!todos[id]||!todos[id][j]) return;
  todos[id][j].done=!todos[id][j].done; persistTodos(); renderTodos();
}
function delTodo(id,j){
  if(!todos[id]) return;
  todos[id].splice(j,1);
  if(!todos[id].length) delete todos[id];
  persistTodos(); renderTodos();
}

/* ===== 編集（並び替え）モード & ダークモード ===== */
function toggleEdit(){
  editMode=!editMode;
  ['btn-edit','btn-edit2'].forEach(id=>{
    const b=document.getElementById(id); if(!b) return;
    b.classList.toggle('active',editMode);
    b.textContent=editMode?'並び替え終了':'並び替え';
  });
  renderSched(); renderTodos();
}
function toggleDark(){
  const on=document.body.classList.toggle('dark');
  localStorage.setItem(DARK,on?'1':'0');
  ['btn-dark','btn-dark2'].forEach(id=>{
    const b=document.getElementById(id); if(b) b.textContent=on?'☀ ライト':'🌙 ダーク';
  });
}

/* ===== 凡例・基準表 ===== */
function renderLegend(){
  document.getElementById('legend').innerHTML=TASKS.map(t=>
    `<span><i style="background:${t.color}"></i>${taskName(t)}</span>`).join('');
}
function renderRules(){
  document.getElementById('rule-body').innerHTML=TASKS.map((t,i)=>{
    const flow=t.noCheck?'（チェックなし・表記のみ）':t.stages.join(' → ');
    return `<tr><td>${i+1}</td>
      <td><span class="chk" style="display:inline-flex;background:${hex2bg(t.color)};color:${t.color};border:1px solid ${hex2bd(t.color)};min-height:auto;padding:2px 8px">${taskName(t)}</span>
      <div style="font-size:11px;color:var(--sub);margin-top:3px">${flow}</div></td>
      <td>${t.rule}</td></tr>`;
  }).join('');
}

/* ===== タブ ===== */
function show(p){
  ['input','sched','todo','rule'].forEach(x=>{
    document.getElementById('page-'+x).style.display = x===p?'block':'none';
    document.getElementById('tab-'+x).classList.toggle('active', x===p);
  });
  if(p==='sched') renderSched();
  if(p==='todo') renderTodos();
}

function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function jsq(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

/* ===== 起動 ===== */
(function init(){
  document.getElementById('today').textContent='本日：'+new Date().toLocaleDateString('ja-JP');
  document.getElementById('year-label').textContent=curYear+'年';
  if(localStorage.getItem(DARK)==='1'){ document.body.classList.add('dark');
    ['btn-dark','btn-dark2'].forEach(id=>{const b=document.getElementById(id);if(b)b.textContent='☀ ライト';}); }
  fillMonthSelects(); renderList(); renderLegend(); renderRules(); renderSched(); renderTodos();
})();
</script>
</body>
